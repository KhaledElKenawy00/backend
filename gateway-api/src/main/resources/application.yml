server:
  port: 8080

spring:
  application:
    name: gateway-api
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/auth/**,/api/otp/**,/api/users/**
        - id: workspace-service
          uri: ${WORKSPACE_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/workspace/**
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/chat/**
        - id: room-service
          uri: ${ROOM_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/rooms/**

# Shared signing secret with user-service; the gateway validates every token at the edge.
jwt:
  secret: ${JWT_SECRET:your-very-strong-secret-key-must-be-at-least-32-characters-long}

gateway:
  # Path prefixes served without authentication (comma-separated). Any path ending in /health is
  # also public. Everything else requires a valid JWT.
  public-path-prefixes: /api/auth/,/api/otp/
  cors:
    # Browser origins allowed to call the API (comma-separated patterns). Defaults to any localhost
    # port for local dev; set to the real web origin(s) in production.
    allowed-origin-patterns: ${GATEWAY_CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info
