spring:
  application:
    name: room-service

  data:
    mongodb:
      uri: mongodb://root:rootpassword@localhost:27017/room_service?authSource=admin
      auto-index-creation: true

    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8086

room:
  exchange: room.exchange
  channel:
    routing-key: room.channel.event
  agora:
    channel-prefix: room-
    app-id: 5db80389fc284a3a8c166979882f118d
    app-certificate: "a6790438be834910b050de22cfcf2555"
  redis:
    ticket-prefix: "room:ws-ticket:"
  presence:
    alive-ttl-seconds: 30
  ws:
    endpoint: /ws/rooms
    ticket-ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.virtualoffice.room_service: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.data.redis: INFO
    org.springframework.web.socket: DEBUG
