spring:
  application:
    name: room-service

  data:
    mongodb:
      uri: mongodb://root:rootpassword@localhost:27017/room_service?authSource=admin
      auto-index-creation: true

    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8086

room:
  exchange: room.exchange
  channel:
    routing-key: room.channel.event
  agora:
    channel-prefix: room-
    app-id: 5db80389fc284a3a8c166979882f118d
    app-certificate: "29ed03c013874f08b643e1fd5084afe3"
  redis:
    ticket-prefix: "room:ws-ticket:"
  presence:
    alive-ttl-seconds: 30
  ws:
    endpoint: /ws/rooms
    ticket-ttl-seconds: 60
  # Inbound server-to-server auth for /api/internal/** (the SkyOffice position feed, §4.2).
  internal:
    token: ${INTERNAL_API_TOKEN:dev-internal-token}
  voice:
    # Default proximity hearing radius (map units) for open areas without a zone-specific radius.
    proximity-default-radius: ${VOICE_PROXIMITY_RADIUS:150}

# Internal API of workspace-service for workspace membership/role checks (§4.1) and zones (§4.3).
workspace:
  service:
    base-url: ${WORKSPACE_SERVICE_URL:http://localhost:8087}
    internal-token: ${INTERNAL_API_TOKEN:dev-internal-token}
    zones-cache-ttl-seconds: ${WORKSPACE_ZONES_CACHE_TTL:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.virtualoffice.room_service: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.data.redis: INFO
    org.springframework.web.socket: DEBUG
