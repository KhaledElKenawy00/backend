# service config
spring.application.name=notifications
server.port=8082

# mongodb config
spring.mongodb.uri=mongodb://root:rootpassword@localhost:27017/notifications?authSource=admin
spring.data.mongodb.auto-index-creation=true

# redis config
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis key prefixes - keep our keys segregated from chat-service's
notifications.redis.ticket-prefix=notif:ws-ticket:
notifications.redis.dedup-prefix=notif:processed:

# rabbit MQ config
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-retries=5
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=30000

# rabbit MQ env vars
notifications.exchange=notifications.exchange
notifications.queue=notifications.queue
notifications.routing.key=routing.key

# mail sender config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=labebkhaled4@gmail.com
spring.mail.password=csqczebcbqkogrbk
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# basic websocket env vars
notifications.ws.endpoint=/api/notifications/connect
notifications.ws.ticket-ttl-seconds=60

# exposing health points ,http://localhost:8082/actuator/health
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
