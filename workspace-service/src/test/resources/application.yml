spring:
  docker:
    compose:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate

# Deterministic secret so internal-endpoint tests can authenticate.
workspace:
  internal:
    token: test-internal-token
  # Required by the chat-channel event publisher; no broker is needed (publishing is best-effort).
  events:
    exchange: workspace.exchange
    channel:
      routing-key: workspace.channel.event
