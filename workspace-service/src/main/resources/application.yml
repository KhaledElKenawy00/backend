server:
  port: 8087

spring:
  application:
    name: workspace-service
  datasource:
    url: ${WORKSPACE_DB_URL:jdbc:postgresql://localhost:5432/workspace}
    username: ${WORKSPACE_DB_USER:workspace}
    password: ${WORKSPACE_DB_PASSWORD:workspace}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates the mapping against it.
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  docker-compose:
    enabled: true
    file: compose.yml
    lifecycle-management: start_only
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Shared secret for /api/internal/** (server-to-server only; blocked at the gateway).
workspace:
  internal:
    token: ${INTERNAL_API_TOKEN:dev-internal-token}
  # Outbound chat-channel events consumed by chat-service (INTEGRATION.md §5.1).
  events:
    exchange: ${WORKSPACE_EXCHANGE:workspace.exchange}
    channel:
      routing-key: ${WORKSPACE_CHANNEL_ROUTING_KEY:workspace.channel.event}
